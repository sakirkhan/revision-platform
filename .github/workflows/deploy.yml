name: Deploy Spring Boot Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend-jar
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: backend-jar
          path: target-artifacts/

      - name: Transfer JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target-artifacts/*.jar"
          target: "/home/ubuntu/app/test-transfer"
          strip_components: 1

      - name: Restart Backend Service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv /home/ubuntu/app/test-transfer/*.jar /home/ubuntu/app/backend.jar
            rm -rf /home/ubuntu/app/test-transfer
            sudo systemctl restart revision-backend
