spring.application.name=revision-platform

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/revision_platform?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Scheduler
spring.main.allow-bean-definition-overriding=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ksakir486@gmail.com
spring.mail.password=upur veyx mikm cwvs
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL used in email CTAs
app.frontend.url=http://localhost:5174

# Logging Configuration
logging.file.name=logs/revision-platform.log
logging.logback.rollingpolicy.max-file-size=1MB
logging.logback.rollingpolicy.max-history=10
logging.logback.rollingpolicy.total-size-cap=50MB
